<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>puppe.rs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    .carousel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 90vw;
      max-height: 80vh;
    }

    .carousel img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .carousel img.active {
      display: block;
      opacity: 1;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      font-size: 2rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 2;
      user-select: none;
    }

    .carousel-btn:hover {
      background: rgba(0,0,0,0.8);
    }

    .carousel-btn.prev { left: 12px; }
    .carousel-btn.next { right: 12px; }

    .dots {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      padding: 0;
    }

    .dot.active {
      background: #fff;
    }

    /* Hide controls when there's only one image */
    .carousel.single .carousel-btn,
    .dots.single { display: none; }
  </style>
</head>
<body>
  <div class="carousel" id="carousel">
    <button class="carousel-btn prev" aria-label="Previous photo">&#8249;</button>

    <!-- Add more <img> tags here to grow the carousel -->
    <img src="dogs.jpg" alt="Two Australian Shepherds at sunrise by the Milwaukee Art Museum" class="active">

    <button class="carousel-btn next" aria-label="Next photo">&#8250;</button>
  </div>
  <div class="dots" id="dots"></div>

  <script>
    const carousel = document.getElementById('carousel');
    const dots = document.getElementById('dots');
    const images = carousel.querySelectorAll('img');
    let current = 0;

    // Hide controls if only one image
    if (images.length <= 1) {
      carousel.classList.add('single');
      dots.classList.add('single');
    }

    // Build dot indicators
    images.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.classList.add('dot');
      if (i === 0) dot.classList.add('active');
      dot.setAttribute('aria-label', `Go to photo ${i + 1}`);
      dot.addEventListener('click', () => goTo(i));
      dots.appendChild(dot);
    });

    function goTo(index) {
      images[current].classList.remove('active');
      dots.children[current]?.classList.remove('active');
      current = (index + images.length) % images.length;
      images[current].classList.add('active');
      dots.children[current]?.classList.add('active');
    }

    // Arrow buttons
    carousel.querySelector('.prev').addEventListener('click', () => goTo(current - 1));
    carousel.querySelector('.next').addEventListener('click', () => goTo(current + 1));

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    // Touch/swipe support
    let touchStartX = 0;
    carousel.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    carousel.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        diff > 0 ? goTo(current + 1) : goTo(current - 1);
      }
    }, { passive: true });
  </script>
</body>
</html>
